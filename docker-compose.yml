services:
  order-service:
    build:
      context: ./order-service
    ports:
      - "8000:8000"
    depends_on:
      - rabbitmq
    environment:
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672/
      - PYTHONPATH=/app

  order-saga-consumer:
    build:
      context: ./order-service
    depends_on:
      - rabbitmq
    environment:
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672/
      - PYTHONPATH=/app
    command: python src/consumers/payment_failed_consumer.py

  payment-service:
    build:
      context: ./payment-service
    ports:
      - "8001:8001"
    depends_on:
      - rabbitmq
    environment:
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672/
      - PYTHONPATH=/app
    command: python src/consumers/order_consumer.py

  inventory-service:
    build:
      context: ./inventory-service
    ports:
      - "8002:8002"
    depends_on:
      - rabbitmq
    environment:
      - AMQP_URL=amqp://guest:guest@rabbitmq:5672/
      - PYTHONPATH=/app
    command: python src/consumers/payment_consumer.py

  notification-service:
    build:
      context: ./notification-service
    ports:
      - "8003:8003"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
